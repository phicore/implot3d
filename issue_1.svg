
    <svg width="670" height="100" xmlns="http://www.w3.org/2000/svg">
        <!-- https://github.com/brenocq/implot3d/issues/104 -->

        <!-- Definitions -->
        <defs>
            <clipPath id="circle-clip">
                <circle cx="0" cy="0" r="17.5" />
            </clipPath>
        </defs>

        <!-- Style -->
        
<style>
    :root {
         --border-color: #d1d9e0;
         --fgColor-default: #1f2328;
         --fgColor-accent: #0969da;
         --fgColor-muted: #59636e;
         --fgColor-success: #1a7f37;
         --fgColor-danger: #d1242f;
         --fgColor-done: #8250df;
         --bgColor-neutral-muted: #818b981f;
         --bgColor-success: #1f883d;
         --text-large: 1rem;
         --text-medium: 0.875rem;
         --text-small: 0.75rem;
         --text-weight-light: 300;
         --text-weight-normal: 400;
         --text-weight-medium: 500;
         --text-weight-semibold: 600;
     }

    text {
        font-family: Arial, sans-serif;
        font-size: var(--text-medium);
    }

    text.title {
        fill: var(--fgColor-default);
        font-size: var(--text-large);
        font-weight: var(--text-weight-semibold);
    }

    text.small {
        font-size: var(--text-small);
        font-weight: var(--text-weight-normal);
    }

    text.medium {
        font-size: var(--text-medium);
        font-weight: var(--text-weight-normal);
    }

    text.muted {
        fill: var(--fgColor-muted);
    }

    text.counter {
        fill: var(--fgColor-muted);
        font-size: 40px;
        text-anchor: middle;
    }

    text.button {
        font-size: 14px;
        fill: var(--fgColor-default);
    }

    text.label {
        font-size: var(--text-medium);
        font-weight: var(--text-weight-semibold);
    }

    text.label-muted {
        fill: var(--fgColor-muted);
        font-size: var(--text-small);
        font-weight: var(--text-weight-normal);
    }

    rect.labelBg {
        fill-opacity: 1.0;
    }

    rect.labelBg-muted {
        fill: none;
        stroke: var(--border-color);
        stroke-width: 0.5px;
    }

    rect.card {
        fill: none;
        stroke: var(--border-color);
        stroke-width: 1.5px;
        rx: 6px;
        ry: 6px;
    }

    rect.progress-bg {
        fill: var(--bgColor-neutral-muted);
    }

    rect.progress-fill {
        fill: var(--bgColor-success);
    }

    .icon-open {
        fill: var(--fgColor-success);
    }

    .icon-closed {
        fill: var(--fgColor-muted);
    }

    .icon-completed {
        fill: var(--fgColor-done);
    }

    .icon-danger {
        fill: var(--fgColor-danger);
    }

    .icon-muted {
        fill: var(--fgColor-muted);
    }

    .icon-default {
        fill: var(--fgColor-default);
    }

    @media (prefers-color-scheme: light) {
        text.label {
            fill: #000000;
        }
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --border-color: #3d444d;
            --fgColor-default: #d1d7e0;
            --fgColor-muted: #9198a1;
            --fgColor-accent: #478be6;
            --fgColor-success: #57ab5a;
            --fgColor-danger: #e5534b;
            --fgColor-done: #986ee2;
            --bgColor-neutral-muted: #656c7633;
            --bgColor-success: #347d39;
            --button-background-color: #2a313c;
        }

        rect.labelBg {
            fill-opacity: 0.2;
        }
    }
</style>


        <!-- Card Background -->
        <rect class="card" x="0" y="0" width="670" height="100"/>

        <!-- Issue Icon -->
        <path class="icon-completed" transform="translate(8, 8)" d="M11.28 6.78a.75.75 0 0 0-1.06-1.06L7.25 8.69 5.78 7.22a.75.75 0 0 0-1.06 1.06l2 2a.75.75 0 0 0 1.06 0l3.5-3.5Z M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0Zm-1.5 0a6.5 6.5 0 1 0-13 0 6.5 6.5 0 0 0 13 0Z"/>

        <!-- Issue Title -->
        <text class="title" x="28" y="18.0" text-anchor="start" dominant-baseline="middle">
            Equal axes <tspan style="fill: var(--fgColor-muted);font-weight: var(--text-weight-normal);">#104</tspan>
        </text>

        
        <!-- Label -->
        <g transform="translate(627.5, 8)">
            <rect class="labelBg-muted" x="-30.5" y="0" width="61" height="16" rx="8.0"/>
            <text class="label-muted" x="0" y="9.0" text-anchor="middle" dominant-baseline="middle">type:feat</text>
        </g>
        
        <!-- Label -->
        <g transform="translate(563.0, 8)">
            <rect class="labelBg-muted" x="-30.0" y="0" width="60" height="16" rx="8.0"/>
            <text class="label-muted" x="0" y="9.0" text-anchor="middle" dominant-baseline="middle">prio:high</text>
        </g>
        
        <!-- Label -->
        <g transform="translate(492.5, 8)">
            <rect class="labelBg-muted" x="-36.5" y="0" width="73" height="16" rx="8.0"/>
            <text class="label-muted" x="0" y="9.0" text-anchor="middle" dominant-baseline="middle">status:done</text>
        </g>
        
        <!-- Contributor Comment -->
        <text class="small" fill="var(--fgColor-muted)" x="8" y="91"><tspan style="text-decoration: underline;">brenocq</tspan> opened on May 25</text>
    
            <!-- Deletions -->
            <text class="small" fill="var(--fgColor-danger)" x="643" y="92">-29</text>
            
            <!-- Additions -->
            <text class="small" fill="var(--fgColor-success)" x="610" y="92">+222</text>
            
            <!-- Commit Count -->
            <text class="small muted" x="599" y="92">9</text>
            
            <path class="icon-muted" transform="translate(585, 82) scale(0.75)" d="M11.93 8.5a4.002 4.002 0 0 1-7.86 0H.75a.75.75 0 0 1 0-1.5h3.32a4.002 4.002 0 0 1 7.86 0h3.32a.75.75 0 0 1 0 1.5Zm-1.43-.75a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"/>
            
            <!-- Linked PR -->
            <text class="small muted" x="554" y="92">#142</text>
            
            <path class="icon-completed" transform="translate(540, 82) scale(0.75)" d="M5.45 5.154A4.25 4.25 0 0 0 9.25 7.5h1.378a2.251 2.251 0 1 1 0 1.5H9.25A5.734 5.734 0 0 1 5 7.123v3.505a2.25 2.25 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.95-.218ZM4.25 13.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm8.5-4.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM5 3.25a.75.75 0 1 0 0 .005V3.25Z"/>
            
        <!-- Avatars -->
        
            <g transform="translate(644.5, 54.0)">
                <image x="-17.5" y="-17.5" width="35" height="35" href="data:image/png;base64," clip-path="url(#circle-clip)" />
                <circle cx="0" cy="0" r="17.5" fill="none" stroke="var(--border-color)" stroke-width="1" />
            </g>
            
            <g transform="translate(624.5, 54.0)">
                <image x="-17.5" y="-17.5" width="35" height="35" href="data:image/png;base64," clip-path="url(#circle-clip)" />
                <circle cx="0" cy="0" r="17.5" fill="none" stroke="var(--border-color)" stroke-width="1" />
            </g>
            
        
                <!-- Comments -->
                <g transform="translate(563.5, 43.0)">
                    <rect class="labelBg-muted" x="0" y="0" width="37" height="22.0" rx="11.0"/>
                    <text class="small muted" x="7" y="15">👀</text>
                    <text class="small muted" x="24" y="15">1</text>
                </g>
                
                <!-- Comments -->
                <g transform="translate(522.5, 43.0)">
                    <rect class="labelBg-muted" x="0" y="0" width="37" height="22.0" rx="11.0"/>
                    <text class="small muted" x="7" y="15">👍</text>
                    <text class="small muted" x="24" y="15">1</text>
                </g>
                
        <!-- Progress Bar -->
        <g transform="translate(8, 42.0)">
            <rect class="progress-bg" rx="4.0" ry="4.0" x="0" y="0" width="335.0" height="8"/>
            <rect class="progress-fill" rx="4.0" ry="4.0" x="0" y="0" width="335" height="8"/>
            <text class="small muted" x="0" y="20"><tspan style="font-weight: var(--text-weight-semibold);">100%</tspan> complete · <tspan style="font-weight: var(--text-weight-semibold);">5</tspan> done</text>
        </g>
        
    </svg>
    